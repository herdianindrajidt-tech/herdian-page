<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UserPortal - Herdian</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .dashboard-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 40px -12px rgba(0,0,0,0.15);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 24px;
      color: #0f172a;
    }

    .header h1 i {
      color: #2563eb;
      margin-right: 10px;
    }

    .user-greeting {
      background: #f8fafc;
      padding: 12px 18px;
      border-radius: 40px;
      font-weight: 600;
      color: #0f172a;
      border: 1px solid #e2e8f0;
    }

    .user-greeting i {
      margin-right: 8px;
      color: #2563eb;
    }

    .user-greeting a {
      color: #ef4444;
      margin-left: 12px;
      font-weight: 600;
      text-decoration: none;
      font-size: 14px;
    }

    .user-greeting a:hover {
      text-decoration: underline;
    }

    .welcome-section {
      background: #dbeafe;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 30px;
      border-left: 6px solid #2563eb;
    }

    .welcome-section h2 {
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    .welcome-section p {
      color: #1e40af;
      margin-bottom: 4px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 30px;
    }

    .info-item {
      background: #f8fafc;
      padding: 16px 18px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .info-item .label {
      font-size: 13px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .info-item .value {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      margin-top: 4px;
    }

    .activity-section {
      background: #f8fafc;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .activity-section h3 {
      color: #0f172a;
      font-size: 18px;
      margin-bottom: 12px;
    }

    .activity-section h3 i {
      color: #2563eb;
      margin-right: 8px;
    }

    .empty-state {
      color: #64748b;
      font-style: italic;
      padding: 8px 0;
      text-align: center;
    }

    .empty-state i {
      display: block;
      font-size: 28px;
      margin-bottom: 8px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="dashboard-card">
    <!-- Header -->
    <div class="header">
      <h1><i class="fas fa-user-circle"></i> UserPortal</h1>
      <div class="user-greeting">
        <i class="fas fa-user"></i> Halo, <strong id="displayUsername">osas</strong>
        <a href="index.html" onclick="localStorage.removeItem('username')"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>

    <!-- Selamat Datang -->
    <div class="welcome-section">
      <h2><i class="fas fa-hand-peace"></i> Selamat Datang, <span id="welcomeUsername">osas</span>!</h2>
      <p>Anda berhasil masuk ke dalam sistem.</p>
      <p>Silakan jelajahi fitur dan informasi akun Anda di bawah ini.</p>
    </div>

    <!-- Informasi Akun -->
    <div class="info-grid">
      <div class="info-item">
        <div class="label"><i class="fas fa-user"></i> Username</div>
        <div class="value" id="infoUsername">osas</div>
      </div>
      <div class="info-item">
        <div class="label"><i class="fas fa-key"></i> Hak Akses</div>
        <div class="value">user</div>
      </div>
    </div>

    <!-- Aktivitas -->
    <div class="activity-section">
      <h3><i class="fas fa-clock"></i> Aktivitas Anda</h3>
      <p style="color: #475569; margin-bottom: 16px;">Semua data aktivitas terbaru Anda akan muncul di bagian ini.</p>
      <div class="empty-state">
        <i class="fas fa-inbox"></i>
        Belum ada aktivitas terbaru saat ini.
      </div>
    </div>
  </div>

  <script>
    // Ambil username dari localStorage (disimpan saat login)
    const username = localStorage.getItem('username') || 'Herdian';

    // Isi semua elemen yang menampilkan username
    document.getElementById('displayUsername').textContent = username;
    document.getElementById('welcomeUsername').textContent = username;
    document.getElementById('infoUsername').textContent = username;
  </script>
</body>
</html>
