<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AdminPanel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Gaya Umum */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Kartu Login */
    .login-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      transition: transform 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-5px);
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-header .icon {
      font-size: 48px;
      color: #2563eb;
      background: #dbeafe;
      width: 80px;
      height: 80px;
      line-height: 80px;
      border-radius: 50%;
      margin: 0 auto 16px;
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
    }

    .login-header p {
      color: #64748b;
      font-size: 15px;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 16px;
    }

    .input-wrapper input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      font-size: 15px;
      transition: 0.3s;
      background: #f8fafc;
    }

    .input-wrapper input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
      background: #ffffff;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: #1d4ed8;
      transform: scale(1.02);
    }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      color: #64748b;
      font-size: 15px;
    }

    .login-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <div class="icon"><i class="fas fa-user-shield"></i></div>
      <h1>AdminPanel</h1>
      <p>Masuk untuk mengakses dashboard Anda</p>
    </div>

    <form id="loginForm" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label><i class="fas fa-user" style="margin-right:6px;"></i> Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="Masukkan username Anda" required>
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-lock" style="margin-right:6px;"></i> Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="Masukkan password Anda" required>
        </div>
      </div>

      <button type="submit" class="btn-login">
        <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i> Masuk
      </button>
    </form>

    <div class="login-footer">
      Belum punya akun? <a href="#">Daftar di sini</a>
    </div>
  </div>

  <script>
    function handleLogin(event) {
      event.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        alert('Username dan password harus diisi!');
        return false;
      }

      // Simpan username untuk ditampilkan di dashboard
      localStorage.setItem('username', username);
      // Arahkan ke halaman dashboard
      window.location.href = "dashboard.html";
      return true;
    }
  </script>
</body>
</html>
